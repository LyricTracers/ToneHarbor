name: Build iOS IPA and Report Errors

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.3.4)'
        required: true
        default: ''

permissions:
  contents: write
  issues: write

env:
  FLUTTER_VERSION: '3.35.7'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build iOS IPA (Xcode 16.2)
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Fix Rust target conflicts
        run: |
          rustup target remove aarch64-apple-ios 2>/dev/null || true
          rustup target add aarch64-apple-ios --toolchain stable

      - name: Cache Pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Print environment info
        run: |
          echo "=== Environment Info ==="
          uname -a
          xcodebuild -version
          flutter --version
          dart --version

      - name: Get dependencies
        run: flutter pub get -v
        timeout-minutes: 15

      - name: Install iOS dependencies
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          sed -i '' '/mirrors.tuna.tsinghua.edu.cn/d' Podfile
          if ! grep -q "cdn.cocoapods.org" Podfile; then
            sed -i '' '1s/^/source "https:\/\/cdn.cocoapods.org\/"\n/' Podfile
          fi
          pod install --verbose
        timeout-minutes: 60

      - name: Build iOS
        id: build
        run: |
          echo "=== Building iOS ==="
          rm -rf build/ios || true
          rm -rf ~/Library/Developer/Xcode/DerivedData || true
          security unlock-keychain -p "" ~/Library/Keychains/login.keychain-db 2>/dev/null || true
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/login.keychain-db 2>/dev/null || true

          export FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))
          export FLUTTER_APPLICATION_PATH="$(pwd)"
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          export EXPANDED_CODE_SIGN_IDENTITY=""
          export DEVELOPMENT_TEAM="AAAAAAAAAA"

          LOGFILE="${RUNNER_WORKSPACE}/ios_build.log"
          if ! flutter build ios --release --no-codesign -v 2>&1 | tee "$LOGFILE"; then
            echo "BUILD_FAILED=true" >> $GITHUB_OUTPUT
            echo "❌ BUILD FAILED"
            tail -n 300 "$LOGFILE"
            exit 1
          fi
          echo "=== iOS build completed ==="
        timeout-minutes: 60

      - name: Verify Runner.app
        if: success()
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ -d "$APP_PATH" ]; then
            echo "✅ Runner.app found at: $APP_PATH"
            du -sh "$APP_PATH"
          else
            echo "::error::Runner.app not found"
            exit 1
          fi

      - name: Create IPA
        if: success()
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -y Payload.zip Payload/
          mv Payload.zip ToneHarbor.ipa
          rm -rf Payload
          echo "IPA created: $(ls -la ToneHarbor.ipa)"

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: ToneHarbor-iOS
          path: ToneHarbor.ipa
          retention-days: 7

      - name: Create issue with build log on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const logPath = `${process.env.RUNNER_WORKSPACE}/ios_build.log`;
            let logContent = '(No log file found)';
            const MAX_CHARS = 60000;
            try {
              if (fs.existsSync(logPath)) {
                const data = fs.readFileSync(logPath, 'utf8');
                logContent = data.length > MAX_CHARS ? data.substring(data.length - MAX_CHARS) : data;
              }
            } catch (e) {
              logContent = `Error reading log: ${e.message}`;
            }
            const title = `❌ iOS Build Failed - ${process.env.GITHUB_REF}`;
            const body = `## 构建失败详情
            **工作流运行**: [${process.env.GITHUB_RUN_ID}](https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})

            ### 错误日志 (最后 60000 字符):
            \`\`\`
            ${logContent}
            \`\`\`
            `;
            let safeBody = body;
            if (safeBody.length > 65000) {
              safeBody = safeBody.substring(0, 65000) + '\n... [日志自动截断]';
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: safeBody
            });
        env:
          RUNNER_WORKSPACE: ${{ runner.workspace }}

  create-release:
    name: Create Release (Success)
    needs: [build-ios]
    if: |
      success() && (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Determine release version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download iOS artifact
        uses: actions/download-artifact@v5
        with:
          name: ToneHarbor-iOS
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## ToneHarbor ${{ steps.get_version.outputs.VERSION }}
            ### 下载说明
            - **ToneHarbor.ipa**: iOS 安装包，适用于越狱设备或侧装
            ### 更新内容
            请查看 [Release 页面](https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.VERSION }})
          files: |
            artifacts/ToneHarbor.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
