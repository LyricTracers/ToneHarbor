name: Build macOS App and Release

on:
  # push:
  #   tags:
  #     - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.3.4)'
        required: true
        default: ''

permissions:
  contents: write
  issues: write

env:
  FLUTTER_VERSION: '3.35.7'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Fix Rust target conflicts
        run: |
          echo "=== Fixing Rust target conflicts ==="
          rustup target add x86_64-apple-darwin 2>/dev/null || true
          echo "=== Rust target fixed ==="

      - name: Cache Pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Print environment info
        run: |
          echo "=== Environment Info ==="
          echo "OS: $(uname -a)"
          flutter --version
          dart --version
          echo "Working directory: $(pwd)"

      - name: Get dependencies
        run: |
          echo "=== Getting Flutter dependencies ==="
          flutter pub get -v
        timeout-minutes: 15

      - name: Install macOS dependencies
        run: |
          echo "=== Installing CocoaPods for macOS ==="
          cd macos
          sed -i '' '/mirrors.tuna.tsinghua.edu.cn/d' Podfile
          if ! grep -q "cdn.cocoapods.org" Podfile; then
            sed -i '' '1s/^/source "https:\/\/cdn.cocoapods.org\/"\n/' Podfile
          fi
          sed -i '' '/baseConfigurationReference/d' Runner.xcodeproj/project.pbxproj
          pod repo list | grep -B2 "mirrors.tuna.tsinghua.edu.cn" | grep -oE '^[a-zA-Z0-9_-]+' | while read repo_name; do
            echo "Removing repo: $repo_name"
            pod repo remove "$repo_name" || true
          done
          pod install --verbose
          # 🔑 修复 Swift Module Name 为空的问题
          echo "Fixing PRODUCT_MODULE_NAME..."
          sed -i '' 's/PRODUCT_MODULE_NAME = "";/PRODUCT_MODULE_NAME = "Runner";/g' Runner.xcodeproj/project.pbxproj
          # 如果字段本身不存在，则添加
          if ! grep -q "PRODUCT_MODULE_NAME" Runner.xcodeproj/project.pbxproj; then
            sed -i '' 's/\(CODE_SIGNING_ALLOWED = NO;\)/\1\n\t\t\t\tPRODUCT_MODULE_NAME = "Runner";/g' Runner.xcodeproj/project.pbxproj
          fi
        timeout-minutes: 60

      - name: Build macOS
        id: build
        run: |
          echo "=== Building macOS ==="
          rm -rf build/macos || true
          rm -rf ~/Library/Developer/Xcode/DerivedData || true
          security unlock-keychain -p "" ~/Library/Keychains/login.keychain-db 2>/dev/null || true
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/login.keychain-db 2>/dev/null || true

          export FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))
          export FLUTTER_APPLICATION_PATH="$(pwd)"
          export PRODUCT_MODULE_NAME="Runner"
          echo "FLUTTER_ROOT=$FLUTTER_ROOT"
          echo "FLUTTER_APPLICATION_PATH=$FLUTTER_APPLICATION_PATH"

          fif ! flutter build macos --release -v 2>&1 | tee "${RUNNER_WORKSPACE}/macos_build.log"; then
            echo "❌ BUILD FAILED"
            tail -n 300 "${RUNNER_WORKSPACE}/macos_build.log"
            exit 1
          fi
          echo "=== macOS build completed ==="
        timeout-minutes: 60

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: macos-build-log
          path: macos_build.log
          retention-days: 3

      - name: Create macOS ZIP
        if: success()
        run: |
          echo "=== Creating macOS ZIP ==="
          APP_PATH=$(find build/macos/Build/Products/Release/ -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found"
            exit 1
          fi
          echo "Found app: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r -y "$OLDPWD/ToneHarbor-macOS.zip" "$(basename "$APP_PATH")"
          echo "ZIP created successfully"

      - name: Upload macOS artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ToneHarbor-macOS
          path: ToneHarbor-macOS.zip
          retention-days: 7

      - name: Debug info on failure
        if: failure()
        run: |
          echo "=== DEBUG INFO ON FAILURE ==="
          echo "Last exit code: $?"
          ls -la
          ls -la build/ 2>/dev/null || echo "No build directory"

      # ---------- 失败时自动创建 Issue ----------
      - name: Create issue with build log on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const logPath = `${process.env.RUNNER_WORKSPACE}/macos_build.log`;
            let logContent = '(No log file found)';
            const MAX_CHARS = 60000;
            try {
              if (fs.existsSync(logPath)) {
                const data = fs.readFileSync(logPath, 'utf8');
                logContent = data.length > MAX_CHARS ? data.substring(data.length - MAX_CHARS) : data;
              }
            } catch (e) {
              logContent = `Error reading log: ${e.message}`;
            }
            const title = `❌ macOS Build Failed - ${process.env.GITHUB_REF}`;
            const body = `## 构建失败详情
            **工作流运行**: [${process.env.GITHUB_RUN_ID}](https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})
            
            ### 错误日志 (最后 60000 字符):
            \`\`\`
            ${logContent}
            \`\`\`
            `;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
        env:
          RUNNER_WORKSPACE: ${{ runner.workspace }}

  create-release:
    name: Create Release
    needs: [build-macos]
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Determine release version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format. Expected: v1.2.3"
            exit 1
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download macOS artifact
        uses: actions/download-artifact@v5
        with:
          name: ToneHarbor-macOS
          path: ./artifacts

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          ls -la ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## ToneHarbor ${{ steps.get_version.outputs.VERSION }}
            
            ### 下载说明
            - **ToneHarbor-macOS.zip**: macOS 应用程序包
            
            ### 更新内容
            请查看 [Release 页面](https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.VERSION }})
          files: |
            artifacts/ToneHarbor-macOS.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}