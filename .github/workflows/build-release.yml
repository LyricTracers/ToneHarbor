name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.3.4)'
        required: true
        default: ''

env:
  FLUTTER_VERSION: '3.35.7'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-multi-platform:
    name: Build iOS IPA and macOS APP
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-apple-ios

      - name: Fix Rust target conflicts
        run: |
          echo "=== Fixing Rust target conflicts ==="
          # Remove conflicting Rust target if it exists
          rustup target remove aarch64-apple-ios 2>/dev/null || true
          # Reinstall with stable toolchain
          rustup target add aarch64-apple-ios --toolchain stable
          echo "=== Rust target fixed ==="

      - name: Cache Pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Print environment info
        run: |
          echo "=== Environment Info ==="
          echo "OS: $(uname -a)"
          echo "Flutter version: $(flutter --version)"
          echo "Dart version: $(dart --version)"
          echo "Working directory: $(pwd)"
          echo "=== End Environment Info ==="

      - name: Get dependencies
        run: |
          echo "=== Getting Flutter dependencies ==="
          flutter pub get -v
          echo "=== Dependencies completed ==="
        timeout-minutes: 15

      - name: Install iOS dependencies
        run: |
          echo "=== Installing CocoaPods ==="
          cd ios
          
          # 1. 移除 Podfile 中的清华源声明
          sed -i '' '/mirrors.tuna.tsinghua.edu.cn/d' Podfile
          
          # 2. 如果 Podfile 中没有官方源，则在首行添加 CDN 源
          if ! grep -q "cdn.cocoapods.org" Podfile; then
            sed -i '' '1s/^/source "https:\/\/cdn.cocoapods.org\/"\n/' Podfile
          fi
          
          # 3. 清理可能导致冲突的 Xcode 项目配置
          sed -i '' '/baseConfigurationReference/d' Runner.xcodeproj/project.pbxproj
          
          # 4. 移除全局 CocoaPods 仓库中指向清华源的本地缓存
          echo "=== Cleaning CocoaPods repo cache ==="
          pod repo list | grep -B2 "mirrors.tuna.tsinghua.edu.cn" | grep -oE '^[a-zA-Z0-9_-]+' | while read repo_name; do
            echo "Removing repo: $repo_name"
            pod repo remove "$repo_name" || true
          done
          
          # 5. 若没有 CDN 的 trunk 仓库，则添加官方 CDN 源
          if ! pod repo list | grep -q "cdn.cocoapods.org"; then
            echo "Adding CDN trunk repo..."
            pod repo add trunk https://cdn.cocoapods.org/ || true
          fi
          
          # 6. 更新 CDN 仓库（必要的首次更新）
          pod repo update trunk --verbose || true
          
          # 7. 执行 pod install（不再使用 --repo-update）
          pod install --verbose
          echo "=== CocoaPods completed ==="
        timeout-minutes: 60

      - name: Build iOS (ARM64 compatible, with full logging)
        run: |
          echo "=== Building iOS via xcodebuild (ARM64 runner) ==="
          cd ios
          
          # 清理可能由架构不匹配导致的构建缓存残留
          rm -rf ~/Library/Developer/Xcode/DerivedData
          
          # 显式调用 xcodebuild，强制输出完整错误，并添加 ARM64 真机构建参数
          xcodebuild -workspace Runner.xcworkspace \
                     -scheme Runner \
                     -configuration Release \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_IDENTITY="" \
                     ARCHS=arm64 \
                     ONLY_ACTIVE_ARCH=YES \
                     build \
                     2>&1 | tee xcodebuild.log
          
          echo "=== iOS build completed ==="
        timeout-minutes: 30

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/xcodebuild.log
          retention-days: 3

      - name: Create IPA
        run: |
          echo "=== Creating IPA ==="
          mkdir -p Payload
          mv ./build/ios/iphoneos/Runner.app Payload
          zip -r -y Payload.zip Payload/Runner.app
          mv Payload.zip ToneHarbor.ipa
          rm -Rf Payload
          echo "IPA created: $(ls -la ToneHarbor.ipa)"
          echo "=== IPA creation completed ==="

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ToneHarbor-iOS
          path: ToneHarbor.ipa
          retention-days: 7

      - name: Build macOS
        run: |
          echo "=== Building macOS ==="
          flutter build macos --release -v
          echo "=== macOS build completed ==="
        timeout-minutes: 30

      - name: Create ZIP archive
        run: |
          echo "=== Creating macOS ZIP ==="
          zip -r -y ToneHarbor-macOS.zip build/macos/Build/Products/Release/ToneHarbor.app
          echo "ZIP created: $(ls -la ToneHarbor-macOS.zip)"
          echo "=== ZIP creation completed ==="

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ToneHarbor-macOS
          path: ToneHarbor-macOS.zip
          retention-days: 7

      - name: Debug info on failure
        if: failure()
        run: |
          echo "=== DEBUG INFO ON FAILURE ==="
          echo "Last exit code: $?"
          echo "=== Directory listing ==="
          ls -la
          echo "=== Build directory ==="
          ls -la build/ 2>/dev/null || echo "Build directory not found"
          echo "=== End DEBUG INFO ==="

  create-release:
    name: Create Release
    needs: [build-multi-platform]
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Determine release version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format. Expected: v1.2.3"
            exit 1
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ToneHarbor-iOS
          path: ./artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ToneHarbor-macOS
          path: ./artifacts

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          ls -la ./artifacts
          echo "=== End artifacts ==="

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## ToneHarbor ${{ steps.get_version.outputs.VERSION }}
            
            ### 下载说明
            - **ToneHarbor.ipa**: iOS 安装包，适用于越狱设备或侧装
            - **ToneHarbor-macOS.zip**: macOS 应用程序包
            
            ### 更新内容
            请查看 [Release 页面](https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.VERSION }})
          files: |
            artifacts/ToneHarbor.ipa
            artifacts/ToneHarbor-macOS.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}