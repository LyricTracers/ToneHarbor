name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.3.4)'
        required: true
        default: ''

env:
  FLUTTER_VERSION: '3.35.7'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-multi-platform:
    name: Build iOS IPA and macOS APP
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Fix Rust target conflicts
        run: |
          echo "=== Fixing Rust target conflicts ==="
          rustup target remove aarch64-apple-ios 2>/dev/null || true
          rustup target add aarch64-apple-ios --toolchain stable
          echo "=== Rust target fixed ==="

      - name: Cache Pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Print environment info
        run: |
          echo "=== Environment Info ==="
          echo "OS: $(uname -a)"
          flutter --version
          dart --version
          echo "Working directory: $(pwd)"
          echo "=== End Environment Info ==="

      - name: Get dependencies
        run: |
          echo "=== Getting Flutter dependencies ==="
          flutter pub get -v
          echo "=== Dependencies completed ==="
        timeout-minutes: 15

      - name: Install iOS dependencies
        run: |
          echo "=== Installing CocoaPods ==="
          cd ios
          
          # 移除可能会超时的清华镜像源
          sed -i '' '/mirrors.tuna.tsinghua.edu.cn/d' Podfile
          
          # 若没有 CDN 源，则添加官方源
          if ! grep -q "cdn.cocoapods.org" Podfile; then
            sed -i '' '1s/^/source "https:\/\/cdn.cocoapods.org\/"\n/' Podfile
          fi
          
          # 清理 Xcode 项目中的自定义配置引用
          sed -i '' '/baseConfigurationReference/d' Runner.xcodeproj/project.pbxproj
          
          # 清理本地 CocoaPods 仓库中残留的清华源
          echo "=== Cleaning CocoaPods repo cache ==="
          pod repo list | grep -B2 "mirrors.tuna.tsinghua.edu.cn" | grep -oE '^[a-zA-Z0-9_-]+' | while read repo_name; do
            echo "Removing repo: $repo_name"
            pod repo remove "$repo_name" || true
          done
          
          # 添加 CDN trunk 仓库（若缺失）
          if ! pod repo list | grep -q "cdn.cocoapods.org"; then
            echo "Adding CDN trunk repo..."
            pod repo add trunk https://cdn.cocoapods.org/ || true
          fi
          
          # 首次更新 trunk
          pod repo update trunk --verbose || true
          
          # 安装 Pod（不再使用 --repo-update，利用缓存加速）
          pod install --verbose
          echo "=== CocoaPods completed ==="
        timeout-minutes: 60

      - name: Build iOS (xcodebuild from flutter command, with fixes and logging)
        run: |
          echo "=== Building iOS via xcodebuild (ARM64 runner) ==="
          cd ios

          # 清理旧缓存
          rm -rf ~/Library/Developer/Xcode/DerivedData || true
          rm -rf ../build/ios || true

          # 解锁钥匙串（避免卡死）
          security unlock-keychain -p "" ~/Library/Keychains/login.keychain-db 2>/dev/null || true
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/login.keychain-db 2>/dev/null || true

          # 🔑 必须设置的环境变量（修复 Flutter 3.35.7 ARM64 空指针）
          export FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))
          export FLUTTER_APPLICATION_PATH="$(cd .. && pwd)"
          echo "FLUTTER_ROOT=$FLUTTER_ROOT"
          echo "FLUTTER_APPLICATION_PATH=$FLUTTER_APPLICATION_PATH"

          # 安全校验
          if [ ! -f "$FLUTTER_APPLICATION_PATH/pubspec.yaml" ]; then
            echo "::error::pubspec.yaml not found"
            exit 1
          fi

          LOGFILE="${GITHUB_WORKSPACE}/xcodebuild.log"

          # 直接使用观察到的 xcodebuild 命令，并补充稳定性参数
          /usr/bin/arch -arm64e xcrun xcodebuild \
            -configuration Release \
            VERBOSE_SCRIPT_LOGGING=YES \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            BUILD_DIR=../build/ios \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            build \
            2>&1 | tee "$LOGFILE"

          sync
          echo "Log saved to $LOGFILE"
          echo "=== iOS build completed ==="
        timeout-minutes: 60

      - name: Verify Runner.app
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ -d "$APP_PATH" ]; then
            echo "Runner.app found at: $APP_PATH"
            echo "Size: $(du -sh "$APP_PATH")"
          else
            echo "::error::Runner.app not found at $APP_PATH"
            ls -la build/ios/iphoneos/ 2>/dev/null || echo "iphoneos directory missing"
            exit 1
          fi

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          retention-days: 3

      - name: Create IPA
        run: |
          echo "=== Creating IPA ==="
          APP_PATH="build/ios/iphoneos/Runner.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Runner.app not found at $APP_PATH"
            exit 1
          fi
          
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -y Payload.zip Payload/
          mv Payload.zip ToneHarbor.ipa
          rm -rf Payload
          
          echo "IPA created: $(ls -la ToneHarbor.ipa)"
          echo "IPA size: $(du -sh ToneHarbor.ipa)"
          echo "=== IPA creation completed ==="

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ToneHarbor-iOS
          path: ToneHarbor.ipa
          retention-days: 7

      - name: Build macOS
        run: |
          echo "=== Building macOS ==="
          flutter build macos --release -v
          echo "=== macOS build completed ==="
        timeout-minutes: 30

      - name: Create macOS ZIP
        run: |
          echo "=== Creating macOS ZIP ==="
          APP_PATH=$(find build/macos/Build/Products/Release/ -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found in build/macos/Build/Products/Release/"
            exit 1
          fi
          echo "Found app: $APP_PATH"
          zip -r -y ToneHarbor-macOS.zip "$APP_PATH"
          echo "ZIP created: $(ls -la ToneHarbor-macOS.zip)"
          echo "=== ZIP creation completed ==="

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ToneHarbor-macOS
          path: ToneHarbor-macOS.zip
          retention-days: 7

      - name: Debug info on failure
        if: failure()
        run: |
          echo "=== DEBUG INFO ON FAILURE ==="
          echo "Last exit code: $?"
          echo "Directory listing:"
          ls -la
          echo "Build directory:"
          ls -la build/ 2>/dev/null || echo "No build directory"
          echo "=== End DEBUG INFO ==="

  create-release:
    name: Create Release
    needs: [build-multi-platform]
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Determine release version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format. Expected: v1.2.3"
            exit 1
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ToneHarbor-iOS
          path: ./artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ToneHarbor-macOS
          path: ./artifacts

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          ls -la ./artifacts
          echo "=== End artifacts ==="

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## ToneHarbor ${{ steps.get_version.outputs.VERSION }}
            
            ### 下载说明
            - **ToneHarbor.ipa**: iOS 安装包，适用于越狱设备或侧装
            - **ToneHarbor-macOS.zip**: macOS 应用程序包
            
            ### 更新内容
            请查看 [Release 页面](https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.VERSION }})
          files: |
            artifacts/ToneHarbor.ipa
            artifacts/ToneHarbor-macOS.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}