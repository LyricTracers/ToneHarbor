name: Build and Release (iOS + macOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: ''
      create_release:
        description: '是否创建 Release'
        type: boolean
        required: true
        default: true
      push_tag:
        description: '是否创建新的 Git 标签（若关闭，则发布到 latest 标签）'
        type: boolean
        required: true
        default: true

permissions:
  contents: write
  issues: write

env:
  FLUTTER_VERSION: '3.35.7'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================== iOS 构建 ====================
  build-ios:
    name: Build iOS IPA
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Fix Rust target conflicts
        run: |
          rustup target remove aarch64-apple-ios 2>/dev/null || true
          rustup target add aarch64-apple-ios --toolchain stable

      - name: Cache Pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Print environment info
        run: |
          echo "=== Environment Info ==="
          uname -a
          xcodebuild -version
          flutter --version
          dart --version

      - name: Get dependencies
        run: flutter pub get -v
        timeout-minutes: 15

      - name: Install iOS dependencies
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          sed -i '' '/mirrors.tuna.tsinghua.edu.cn/d' Podfile
          if ! grep -q "cdn.cocoapods.org" Podfile; then
            sed -i '' '1s/^/source "https:\/\/cdn.cocoapods.org\/"\n/' Podfile
          fi
          pod install --verbose
        timeout-minutes: 60

      - name: Inject team and profile into Runner project
        run: |
          cd ios
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('Runner.xcodeproj')
          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['DEVELOPMENT_TEAM'] = 'AAAAAAAAAA'
              config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'ABCDEFGHIJ'
              config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
              config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
              config.build_settings['CODE_SIGNING_IDENTITY'] = ''
            end
          end
          project.save
          " || echo "Failed to inject via xcodeproj gem, fallback to sed"
          if [ $? -ne 0 ]; then
            sed -i '' '/DEVELOPMENT_TEAM/d' Runner.xcodeproj/project.pbxproj
            sed -i '' '/PROVISIONING_PROFILE_SPECIFIER/d' Runner.xcodeproj/project.pbxproj
            for file in $(grep -l "CODE_SIGNING_ALLOWED" Runner.xcodeproj/project.pbxproj); do
              sed -i '' 's/\(CODE_SIGNING_ALLOWED = NO;\)/\1\n\t\t\t\tDEVELOPMENT_TEAM = "AAAAAAAAAA";\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "ABCDEFGHIJ";/' "$file"
            done
          fi
          cd ..

      - name: Build iOS
        id: build
        run: |
          echo "=== Building iOS ==="
          rm -rf build/ios || true
          rm -rf ~/Library/Developer/Xcode/DerivedData || true
          security unlock-keychain -p "" ~/Library/Keychains/login.keychain-db 2>/dev/null || true
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/login.keychain-db 2>/dev/null || true

          export FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))
          export FLUTTER_APPLICATION_PATH="$(pwd)"
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          export EXPANDED_CODE_SIGN_IDENTITY=""

          LOGFILE="${RUNNER_WORKSPACE}/ios_build.log"
          if ! flutter build ios --release --no-codesign -v 2>&1 | tee "$LOGFILE"; then
            echo "❌ BUILD FAILED"
            tail -n 300 "$LOGFILE"
            exit 1
          fi
          echo "=== iOS build completed ==="
        timeout-minutes: 60

      - name: Verify Runner.app
        if: success()
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ -d "$APP_PATH" ]; then
            echo "✅ Runner.app found at: $APP_PATH"
            du -sh "$APP_PATH"
          else
            echo "::error::Runner.app not found"
            exit 1
          fi

      - name: Create IPA
        if: success()
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -y Payload.zip Payload/
          mv Payload.zip ToneHarbor.ipa
          rm -rf Payload
          echo "IPA created: $(ls -la ToneHarbor.ipa)"

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ToneHarbor-iOS
          path: ToneHarbor.ipa
          retention-days: 7

      - name: Create issue with build log on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const logPath = `${process.env.RUNNER_WORKSPACE}/ios_build.log`;
            let logContent = '(No log file found)';
            const MAX_CHARS = 60000;
            try {
              if (fs.existsSync(logPath)) {
                const data = fs.readFileSync(logPath, 'utf8');
                logContent = data.length > MAX_CHARS ? data.substring(data.length - MAX_CHARS) : data;
              }
            } catch (e) {
              logContent = `Error reading log: ${e.message}`;
            }
            const title = `❌ iOS Build Failed - ${process.env.GITHUB_REF}`;
            const body = `## 构建失败详情
            **工作流运行**: [${process.env.GITHUB_RUN_ID}](https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})
            
            ### 错误日志 (最后 60000 字符):
            \`\`\`
            ${logContent}
            \`\`\`
            `;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
        env:
          RUNNER_WORKSPACE: ${{ runner.workspace }}

  # ==================== macOS 构建 ====================
  build-macos:
    name: Build macOS App
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Fix Rust target conflicts
        run: |
          echo "=== Fixing Rust target conflicts ==="
          rustup target remove aarch64-apple-darwin 2>/dev/null || true
          rustup target add aarch64-apple-darwin --toolchain stable
          echo "=== Rust target fixed ==="

      - name: Cache Pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Print environment info
        run: |
          echo "=== Environment Info ==="
          echo "OS: $(uname -a)"
          flutter --version
          dart --version
          echo "Working directory: $(pwd)"

      - name: Get dependencies
        run: |
          echo "=== Getting Flutter dependencies ==="
          flutter clean
          flutter pub get -v
        timeout-minutes: 30

      - name: Install macOS dependencies
        run: |
          echo "=== Installing CocoaPods for macOS ==="
          cd macos
          sed -i '' '/mirrors.tuna.tsinghua.edu.cn/d' Podfile
          if ! grep -q "cdn.cocoapods.org" Podfile; then
            sed -i '' '1s/^/source "https:\/\/cdn.cocoapods.org\/"\n/' Podfile
          fi
          pod repo list | grep -B2 "mirrors.tuna.tsinghua.edu.cn" | grep -oE '^[a-zA-Z0-9_-]+' | while read repo_name; do
            echo "Removing repo: $repo_name"
            pod repo remove "$repo_name" || true
          done
          pod install  --verbose
        timeout-minutes: 60

      - name: Build macOS
        id: build
        run: |
          echo "=== Building macOS ==="
          rm -rf build/macos || true
          rm -rf ~/Library/Developer/Xcode/DerivedData || true

          if ! flutter build macos --release -v 2>&1 | tee "${RUNNER_WORKSPACE}/macos_build.log"; then
            echo "❌ BUILD FAILED"
            tail -n 300 "${RUNNER_WORKSPACE}/macos_build.log"
            exit 1
          fi
          echo "=== macOS build completed ==="
        timeout-minutes: 60

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: macos-build-log
          path: macos_build.log
          retention-days: 3

      - name: Create macOS ZIP
        if: success()
        run: |
          echo "=== Creating macOS ZIP ==="
          APP_PATH=$(find build/macos/Build/Products/Release/ -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found"
            exit 1
          fi
          echo "Found app: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r -y "$OLDPWD/ToneHarbor-macOS.zip" "$(basename "$APP_PATH")"
          echo "ZIP created successfully"

      - name: Upload macOS artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ToneHarbor-macOS
          path: ToneHarbor-macOS.zip
          retention-days: 7

      - name: Debug info on failure
        if: failure()
        run: |
          echo "=== DEBUG INFO ON FAILURE ==="
          echo "Last exit code: $?"
          ls -la
          ls -la build/ 2>/dev/null || echo "No build directory"

      - name: Create issue with build log on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const logPath = `${process.env.RUNNER_WORKSPACE}/macos_build.log`;
            let logContent = '(No log file found)';
            const MAX_CHARS = 60000;
            try {
              if (fs.existsSync(logPath)) {
                const data = fs.readFileSync(logPath, 'utf8');
                logContent = data.length > MAX_CHARS ? data.substring(data.length - MAX_CHARS) : data;
              }
            } catch (e) {
              logContent = `Error reading log: ${e.message}`;
            }
            const title = `❌ macOS Build Failed - ${process.env.GITHUB_REF}`;
            const body = `## 构建失败详情
            **工作流运行**: [${process.env.GITHUB_RUN_ID}](https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})
            
            ### 错误日志 (最后 60000 字符):
            \`\`\`
            ${logContent}
            \`\`\`
            `;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
        env:
          RUNNER_WORKSPACE: ${{ runner.workspace }}

  create-release:
    name: Create Release (iOS + macOS)
    needs: [build-ios, build-macos]
    if: |
      (startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' && github.event.inputs.create_release == 'true'))
      && success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine release version, tag and change log
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-\._].*)?$ ]]; then
            echo "::error::Invalid version format"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

          # 决定真正的 Git 标签名
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PUSH_TAG="${{ github.event.inputs.push_tag }}"
            if [[ "$PUSH_TAG" == "true" ]]; then
              TAG_NAME="$VERSION"
            else
              TAG_NAME="latest"
            fi
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

          # 🔑 如果使用 latest 标签，强制更新该标签指向当前 commit
          git fetch --tags -q
          if [[ "$TAG_NAME" == "latest" ]]; then
            echo "Moving latest tag to current commit..."
            git tag -f "$TAG_NAME"
            git push origin "$TAG_NAME" --force
          fi

          if [[ "$VERSION" =~ [-_] ]]; then
            IS_PRERELEASE="true"
          else
            IS_PRERELEASE="false"
          fi
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT

          # 获取上一个正式版标签
          PREVIOUS_TAG=$(git tag | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | grep -v "^${VERSION}$" | tail -1)
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGE_LOG="请查看提交记录"
          else
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${TAG_NAME}"
            CHANGE_LOG="查看变更: [${COMPARE_URL}](${COMPARE_URL})"
          fi
          echo "CHANGE_LOG=$CHANGE_LOG" >> $GITHUB_OUTPUT

      - name: Download iOS artifact
        uses: actions/download-artifact@v8
        with:
          name: ToneHarbor-iOS
          path: ./artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: ToneHarbor-macOS
          path: ./artifacts

      - name: Rename artifacts with version
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          cd artifacts
          mv ToneHarbor.ipa "ToneHarbor-${VERSION}.ipa"
          mv ToneHarbor-macOS.zip "ToneHarbor-${VERSION}-macOS.zip"
          echo "Renamed files:"
          ls -la

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          ls -la ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
          body: |
            ## ToneHarbor ${{ steps.get_version.outputs.VERSION }}
            
            ### 下载说明
            - **ToneHarbor-${{ steps.get_version.outputs.VERSION }}.ipa**: iOS 安装包
            - **ToneHarbor-${{ steps.get_version.outputs.VERSION }}-macOS.zip**: macOS 应用程序包
            
            ### 更新内容
            ${{ steps.get_version.outputs.CHANGE_LOG }}
          files: |
            artifacts/ToneHarbor-${{ steps.get_version.outputs.VERSION }}.ipa
            artifacts/ToneHarbor-${{ steps.get_version.outputs.VERSION }}-macOS.zip
          draft: false
          prerelease: ${{ steps.get_version.outputs.IS_PRERELEASE == 'true' }}
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: [build-ios, build-macos]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (for gh)
        uses: actions/checkout@v6

      - name: Generate download page
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p public
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          RELEASES=$(gh release list --limit 50 --json tagName,isPrerelease --jq '.')
          LATEST_TAG=$(echo "$RELEASES" | jq -r '.[0].tagName // ""')
          LATEST_IS_PRERELEASE=$(echo "$RELEASES" | jq -r '.[0].isPrerelease // false')
          LATEST_RELEASE_TAG=$(echo "$RELEASES" | jq -r '.[] | select(.isPrerelease==false) | .tagName' | head -1)

          # 如果没有 Release，生成简单空页面（使用 echo 避免 heredoc 问题）
          if [ -z "$LATEST_TAG" ]; then
            echo '<!DOCTYPE html>' > public/index.html
            echo '<html lang="zh-CN">' >> public/index.html
            echo '<head><meta charset="utf-8"><title>ToneHarbor - Downloads</title>' >> public/index.html
            echo '<style>body{font-family:sans-serif;background:#0f172a;color:#e2e8f0;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}.empty{text-align:center;font-size:1.2rem;color:#94a3b8}</style>' >> public/index.html
            echo '</head><body><div class="empty">No releases available yet. Check back soon!</div></body></html>' >> public/index.html
            exit 0
          fi

          # 生成带完整样式的页面（主题部分）
          cat > public/index.html <<'HTML_EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>ToneHarbor - Downloads</title>
              <link rel="preconnect" href="https://fonts.googleapis.com">
              <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
              <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
                      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
                      color: #e2e8f0;
                      min-height: 100vh;
                      display: flex;
                      flex-direction: column;
                      align-items: center;
                      padding: 2rem 1rem;
                  }
                  .container {
                      width: 100%;
                      max-width: 700px;
                      background: rgba(30, 41, 59, 0.8);
                      backdrop-filter: blur(12px);
                      border-radius: 20px;
                      border: 1px solid rgba(255, 255, 255, 0.1);
                      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
                      padding: 2.5rem;
                      margin-top: 2rem;
                  }
                  .header {
                      text-align: center;
                      margin-bottom: 2.5rem;
                  }
                  .header h1 {
                      font-size: 2.5rem;
                      font-weight: 700;
                      background: linear-gradient(to right, #38bdf8, #818cf8);
                      -webkit-background-clip: text;
                      -webkit-text-fill-color: transparent;
                      background-clip: text;
                      margin-bottom: 0.5rem;
                  }
                  .header .subtitle {
                      font-size: 1rem;
                      color: #94a3b8;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      gap: 0.5rem;
                  }
                  .version-card {
                      background: rgba(15, 23, 42, 0.6);
                      border-radius: 16px;
                      padding: 1.5rem;
                      margin-bottom: 1.5rem;
                      border: 1px solid rgba(255, 255, 255, 0.05);
                      transition: transform 0.2s, box-shadow 0.2s;
                  }
                  .version-card:hover {
                      transform: translateY(-2px);
                      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
                  }
                  .version-header {
                      display: flex;
                      align-items: center;
                      gap: 0.75rem;
                      margin-bottom: 1.2rem;
                  }
                  .badge {
                      display: inline-flex;
                      align-items: center;
                      padding: 0.2em 0.8em;
                      border-radius: 20px;
                      font-size: 0.8rem;
                      font-weight: 600;
                  }
                  .badge-prerelease {
                      background: rgba(251, 191, 36, 0.2);
                      color: #fbbf24;
                      border: 1px solid rgba(251, 191, 36, 0.3);
                  }
                  .badge-stable {
                      background: rgba(52, 211, 153, 0.2);
                      color: #34d399;
                      border: 1px solid rgba(52, 211, 153, 0.3);
                  }
                  .version-title {
                      font-size: 1.25rem;
                      font-weight: 600;
                  }
                  .download-links {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                      gap: 1rem;
                  }
                  .download-link {
                      display: flex;
                      align-items: center;
                      gap: 0.6rem;
                      background: rgba(255, 255, 255, 0.05);
                      border: 1px solid rgba(255, 255, 255, 0.1);
                      border-radius: 12px;
                      padding: 1rem;
                      text-decoration: none;
                      color: #e2e8f0;
                      font-weight: 500;
                      transition: all 0.2s;
                  }
                  .download-link:hover {
                      background: rgba(56, 189, 248, 0.1);
                      border-color: rgba(56, 189, 248, 0.4);
                      transform: translateY(-1px);
                  }
                  .download-link .icon {
                      font-size: 1.5rem;
                  }
                  .footer {
                      text-align: center;
                      margin-top: 2rem;
                      color: #64748b;
                      font-size: 0.85rem;
                  }
                  .empty-state {
                      text-align: center;
                      color: #64748b;
                      padding: 2rem;
                      font-style: italic;
                  }
                  @media (max-width: 600px) {
                      .container { padding: 1.5rem; }
                      .header h1 { font-size: 2rem; }
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="header">
                      <h1>🎵 ToneHarbor</h1>
                      <div class="subtitle">
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                          Updated: __BUILD_TIME__
                      </div>
                  </div>
                  <div id="content"></div>
                  <div class="footer">
                      Built with ❤️ using GitHub Actions
                  </div>
              </div>
              <script>
                  const LATEST_TAG = '__LATEST_TAG__';
                  const LATEST_IS_PRERELEASE = __LATEST_IS_PRERELEASE__;
                  const LATEST_RELEASE_TAG = '__LATEST_RELEASE_TAG__';
                  const GITHUB_REPOSITORY = '__GITHUB_REPOSITORY__';
                  
                  function createVersionCard(tag, type) {
                      const card = document.createElement('div');
                      card.className = 'version-card';
                      
                      const header = document.createElement('div');
                      header.className = 'version-header';
                      
                      const badge = document.createElement('span');
                      if (type === 'prerelease') {
                          badge.className = 'badge badge-prerelease';
                          badge.textContent = 'Pre-release';
                      } else {
                          badge.className = 'badge badge-stable';
                          badge.textContent = 'Stable';
                      }
                      
                      const title = document.createElement('span');
                      title.className = 'version-title';
                      title.textContent = `Version ${tag}`;
                      
                      header.appendChild(badge);
                      header.appendChild(title);
                      
                      const links = document.createElement('div');
                      links.className = 'download-links';
                      
                      const ipaLink = document.createElement('a');
                      ipaLink.className = 'download-link';
                      ipaLink.href = `https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/ToneHarbor-${tag}.ipa`;
                      ipaLink.innerHTML = '<span class="icon">📱</span> iOS IPA';
                      
                      const macLink = document.createElement('a');
                      macLink.className = 'download-link';
                      macLink.href = `https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/ToneHarbor-${tag}-macOS.zip`;
                      macLink.innerHTML = '<span class="icon">💻</span> macOS App';
                      
                      links.appendChild(ipaLink);
                      links.appendChild(macLink);
                      
                      card.appendChild(header);
                      card.appendChild(links);
                      return card;
                  }
                  
                  const content = document.getElementById('content');
                  if (LATEST_IS_PRERELEASE) {
                      content.appendChild(createVersionCard(LATEST_TAG, 'prerelease'));
                      if (LATEST_RELEASE_TAG) {
                          content.appendChild(createVersionCard(LATEST_RELEASE_TAG, 'stable'));
                      } else {
                          const empty = document.createElement('div');
                          empty.className = 'empty-state';
                          empty.textContent = 'No stable release available yet.';
                          content.appendChild(empty);
                      }
                  } else {
                      content.appendChild(createVersionCard(LATEST_TAG, 'stable'));
                  }
              </script>
          </body>
          </html>
          HTML_EOF

          # 安全替换占位符（使用 | 作为分隔符，避免路径中的 / 冲突）
          sed -i "s|__BUILD_TIME__|$BUILD_TIME|g" public/index.html
          sed -i "s|__LATEST_TAG__|$LATEST_TAG|g" public/index.html
          if [ "$LATEST_IS_PRERELEASE" = "true" ]; then
              sed -i "s|__LATEST_IS_PRERELEASE__|true|g" public/index.html
          else
              sed -i "s|__LATEST_IS_PRERELEASE__|false|g" public/index.html
          fi
          sed -i "s|__LATEST_RELEASE_TAG__|$LATEST_RELEASE_TAG|g" public/index.html
          sed -i "s|__GITHUB_REPOSITORY__|$GITHUB_REPOSITORY|g" public/index.html

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
          clean: true