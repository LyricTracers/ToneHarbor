name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.3.4)'
        required: false
        default: ''

env:
  FLUTTER_VERSION: '3.35.7'

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Install iOS dependencies
        run: cd ios && pod install --repo-update

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          mv ./build/ios/iphoneos/Runner.app Payload
          zip -r -y ToneHarbor.ipa Payload
          rm -Rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ToneHarbor-iOS
          path: ToneHarbor.ipa

  build-macos:
    name: Build macOS APP
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Create ZIP archive
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y ../../../../ToneHarbor-macOS.zip "ToneHarbor.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ToneHarbor-macOS
          path: ToneHarbor-macOS.zip

  create-release:
    name: Create Release
    needs: [build-ios, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ToneHarbor-iOS
          path: ./artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ToneHarbor-macOS
          path: ./artifacts

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## ToneHarbor ${{ steps.get_version.outputs.VERSION }}
            
            ### 下载说明
            - **ToneHarbor.ipa**: iOS 安装包，适用于越狱设备或侧装
            - **ToneHarbor-macOS.zip**: macOS 应用程序包
            
            ### 更新内容
            请查看 [提交记录](https://github.com/${{ github.repository }}/commits/${{ steps.get_version.outputs.VERSION }})
          files: |
            artifacts/ToneHarbor.ipa
            artifacts/ToneHarbor-macOS.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
