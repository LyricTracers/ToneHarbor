name: Deploy GitHub Pages

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate download page
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p public
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          git fetch --tags -q

          # 1. 获取最新正式版标签（纯数字版本号，如 v1.0.2）
          LATEST_STABLE=$(git tag -l 'v*.*.*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V -r | head -1)

          # 2. 检查 latest Release 并提取真实版本号
          LATEST_RELEASE_DATA=$(gh release view latest --json body,tagName 2>/dev/null || echo "")
          LATEST_TAG=$(echo "$LATEST_RELEASE_DATA" | jq -r '.tagName // ""')
          LATEST_VERSION=""

          if [ "$LATEST_TAG" = "latest" ] && [ -n "$LATEST_RELEASE_DATA" ]; then
            # 从 body 中提取版本号（例如 "## ToneHarbor v1.0.3_pre1"）
            # 使用原始有效的正则捕获组
            EXTRACTED_VERSION=$(echo "$LATEST_RELEASE_DATA" | jq -r '.body | capture("## ToneHarbor (?<ver>v[^ ]+)") | .ver // ""')
            if [ -n "$EXTRACTED_VERSION" ]; then
              # 去除前后空白符和换行符，确保干净
              LATEST_VERSION=$(echo "$EXTRACTED_VERSION" | tr -d '\n\r' | xargs)
            fi
          fi

          # 3. 决定显示逻辑（基于纯数字版本号比较）
          SHOW_STABLE=true
          SHOW_LATEST=false
          if [ -n "$LATEST_VERSION" ]; then
            if [ -z "$LATEST_STABLE" ]; then
              SHOW_LATEST=true
            else
              # 提取纯数字部分，例如 v1.0.2、v1.0.3
              STABLE_NUM=$(echo "$LATEST_STABLE" | grep -oE '^v[0-9]+\.[0-9]+\.[0-9]+')
              LATEST_NUM=$(echo "$LATEST_VERSION" | grep -oE '^v[0-9]+\.[0-9]+\.[0-9]+')
              # 使用 sort -V 比较纯数字版本
              HIGHER_NUM=$(printf "%s\n%s" "${STABLE_NUM}" "${LATEST_NUM}" | sort -V | tail -1)
              if [ "$HIGHER_NUM" = "${LATEST_NUM}" ] && [ "${STABLE_NUM}" != "${LATEST_NUM}" ]; then
                SHOW_LATEST=true
              fi
            fi
          fi

          # 如果没有正式版且不显示 latest，则提示无版本
          if [ -z "$LATEST_STABLE" ] && [ "$SHOW_LATEST" = false ]; then
            echo '<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><title>拾音坞</title></head><body style="background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif"><p>暂无可用版本，敬请期待。</p></body></html>' > public/index.html
            exit 0
          fi

          # 4. 生成 HTML 页面（样式和脚本保持不变）
          cat > public/index.html <<'HTML_EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>拾音坞</title>
              <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: 'Inter', system-ui, sans-serif;
                      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
                      color: #e2e8f0;
                      min-height: 100vh;
                      display: flex;
                      flex-direction: column;
                      align-items: center;
                      padding: 2rem 1rem;
                  }
                  .container {
                      width: 100%;
                      max-width: 700px;
                      background: rgba(30,41,59,0.8);
                      backdrop-filter: blur(12px);
                      border-radius: 20px;
                      border: 1px solid rgba(255,255,255,0.1);
                      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
                      padding: 2.5rem;
                      margin-top: 2rem;
                  }
                  .header { text-align: center; margin-bottom: 2.5rem; }
                  .header h1 {
                      font-size: 2.5rem; font-weight: 700;
                      background: linear-gradient(to right, #38bdf8, #818cf8);
                      -webkit-background-clip: text;
                      -webkit-text-fill-color: transparent;
                      background-clip: text;
                      margin-bottom: 0.3rem;
                  }
                  .header .subtitle { font-size: 1.05rem; color: #94a3b8; }
                  .header .update-time { font-size: 0.85rem; color: #64748b; margin-top: 0.6rem; }
                  .card {
                      background: rgba(15,23,42,0.6);
                      border-radius: 16px;
                      padding: 1.5rem;
                      margin-bottom: 1.5rem;
                      border: 1px solid rgba(255,255,255,0.05);
                  }
                  .badge {
                      display: inline-flex; align-items: center;
                      padding: 0.2em 0.8em; border-radius: 20px;
                      font-size: 0.8rem; font-weight: 600;
                  }
                  .badge-prerelease { background: rgba(251,191,36,0.2); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
                  .badge-stable { background: rgba(52,211,153,0.2); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
                  .version-title { font-size: 1.25rem; font-weight: 600; }
                  .links {
                      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                      gap: 1rem; margin-top: 1rem;
                  }
                  .link {
                      display: flex; align-items: center; gap: 0.6rem;
                      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
                      border-radius: 12px; padding: 1rem; text-decoration: none;
                      color: #e2e8f0; font-weight: 500; transition: all 0.2s;
                  }
                  .link:hover { background: rgba(56,189,248,0.1); border-color: rgba(56,189,248,0.4); }
                  .footer { text-align: center; margin-top: 2.5rem; color: #64748b; font-size: 0.85rem; }
                  @media (max-width: 600px) {
                      .container { padding: 1.5rem; }
                      .header h1 { font-size: 2rem; }
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="header">
                      <h1>拾音坞</h1>
                      <div class="subtitle">一坞藏万乐，双耳遇知音</div>
                      <div class="update-time">Updated: __BUILD_TIME__</div>
                  </div>
                  <div id="content"></div>
                  <div class="footer">Built with GitHub Actions</div>
              </div>
              <script>
                  const GITHUB_REPOSITORY = '__GITHUB_REPOSITORY__';
                  const STABLE_TAG = '__STABLE_TAG__';
                  const LATEST_VERSION = '__LATEST_VERSION__';
                  const SHOW_LATEST = __SHOW_LATEST__;

                  function createCard(tag, type, displayTag) {
                      const card = document.createElement('div');
                      card.className = 'card';
                      const header = document.createElement('div');
                      header.style.display = 'flex';
                      header.style.alignItems = 'center';
                      header.style.gap = '0.75rem';
                      const badge = document.createElement('span');
                      badge.className = type === 'prerelease' ? 'badge badge-prerelease' : 'badge badge-stable';
                      badge.textContent = type === 'prerelease' ? 'Pre-release' : 'Release';
                      const title = document.createElement('span');
                      title.className = 'version-title';
                      title.textContent = `Version ${displayTag}`;
                      header.appendChild(badge);
                      header.appendChild(title);

                      const links = document.createElement('div');
                      links.className = 'links';
                      let dlTag = tag;
                      if (type === 'prerelease') {
                          dlTag = 'latest';
                      }
                      const ipaName = `ToneHarbor-${displayTag}.ipa`;
                      const macName = `ToneHarbor-${displayTag}-macOS.zip`;
                      const baseUrl = `https://github.com/${GITHUB_REPOSITORY}/releases/download/${dlTag}`;

                      const ipa = document.createElement('a');
                      ipa.className = 'link';
                      ipa.href = `${baseUrl}/${ipaName}`;
                      ipa.innerHTML = '<span>📱</span> iOS IPA';
                      const mac = document.createElement('a');
                      mac.className = 'link';
                      mac.href = `${baseUrl}/${macName}`;
                      mac.innerHTML = '<span>💻</span> macOS App';
                      links.appendChild(ipa);
                      links.appendChild(mac);

                      card.appendChild(header);
                      card.appendChild(links);
                      return card;
                  }

                  const content = document.getElementById('content');
                  if (STABLE_TAG) {
                      content.appendChild(createCard(STABLE_TAG, 'release', STABLE_TAG));
                  }
                  if (SHOW_LATEST && LATEST_VERSION) {
                      content.appendChild(createCard('latest', 'prerelease', LATEST_VERSION));
                  }
              </script>
          </body>
          </html>
          HTML_EOF

          # 再次清理所有可能引入多余字符的变量
          LATEST_STABLE=$(echo "$LATEST_STABLE" | tr -d '\n\r' | xargs)
          LATEST_VERSION=$(echo "$LATEST_VERSION" | tr -d '\n\r' | xargs)
          # 替换占位符
          sed -i "s|__BUILD_TIME__|$BUILD_TIME|g" public/index.html
          sed -i "s|__GITHUB_REPOSITORY__|$GITHUB_REPOSITORY|g" public/index.html
          sed -i "s|__STABLE_TAG__|$LATEST_STABLE|g" public/index.html
          sed -i "s|__LATEST_VERSION__|$LATEST_VERSION|g" public/index.html
          if [ "$SHOW_LATEST" = true ]; then
              sed -i "s|__SHOW_LATEST__|true|g" public/index.html
          else
              sed -i "s|__SHOW_LATEST__|false|g" public/index.html
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
          clean: true