flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/

flutter_native_splash:
  color: "#F8F6F0"
  window_width: 1230
  window_height: 780
  window_minimum_width: 320
  window_minimum_height: 600
  window_button_visibility: true
  skip_taskbar: false
  center: true
  hide_titlebar: true
  animation_type: audioEqualizer
  animation_color: "#4A5859"
  text: "「拾音坞｜一坞藏万乐，双耳遇知音」"
  text_color: "#4A5859"
